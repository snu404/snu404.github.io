<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Thermodynamics Attendance</title>

<style>
body{margin:0;font-family:system-ui;background:#0b1020;color:#e8ecff}
.wrap{max-width:1000px;margin:auto;padding:16px}
.card{background:#111833;padding:16px;border-radius:12px}
table{width:100%;border-collapse:collapse;margin-top:12px}
td,th{padding:8px;border-bottom:1px solid rgba(255,255,255,.1)}
.pill{padding:6px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.2);cursor:pointer}
.on{background:#2ecc71}
.toast{margin-top:10px;padding:10px;border-radius:10px;display:none}
</style>
</head>

<body>
<div class="wrap">
<div class="card">

날짜:
<input id="date" type="date">

<button onclick="submit()">구글 시트 저장</button>

<div id="toast" class="toast"></div>

<table>
<thead>
<tr><th>No</th><th>학번</th><th>이름</th><th>출석</th></tr>
</thead>
<tbody id="tbl"></tbody>
</table>

</div>
</div>

<script>
const roster = [
["20230792","최찬영"],["20240812","홍지연"],["20240231","노경민"],
["20240290","박은지"],["20240301","박주영"],["20240501","이민석"]
]; // ← 필요시 전체 명단 붙이세요

const ENDPOINT =
"https://script.google.com/macros/s/AKfycbzOY76uHElOCZ5UBKpDQIeCZGqpw8YY9PL7ceVuTuXl8iSp6V5fR0DA-n05LMdHwsuO/exec";

  

const tbody=document.getElementById("tbl");
const toast=document.getElementById("toast");

function showToast(msg){
 toast.innerText=msg;
 toast.style.display="block";
 setTimeout(()=>toast.style.display="none",3000);
}

function render(){
 tbody.innerHTML="";
 roster.forEach((r,i)=>{
  const tr=document.createElement("tr");

  tr.innerHTML=`
    <td>${i+1}</td>
    <td>${r[0]}</td>
    <td>${r[1]}</td>
    <td><span class="pill on">출석</span></td>
  `;

  tr.dataset.sid=r[0];
  tr.dataset.name=r[1];
  tr.dataset.status="P"; // ✅ 기본 출석

  tr.querySelector(".pill").onclick=()=>{
    tr.dataset.status = tr.dataset.status==="P"?"A":"P";
    tr.querySelector(".pill").classList.toggle("on");
  };

  tbody.appendChild(tr);
 });
}

function submit(){

 const date=document.getElementById("date").value;
 if(!date){ alert("날짜 선택"); return; }

 const rows=[...tbody.querySelectorAll("tr")].map(r=>({
   studentId:r.dataset.sid,
   name:r.dataset.name,
   status:r.dataset.status
 }));

 const payload=JSON.stringify({
   kind:"attendance_batch_v1",
   date,
   session:"Mon",
   recorder:"prof",
   records:rows
 });

 // ⭐⭐⭐ Load failed 방지 핵심 ⭐⭐⭐
 const ok = navigator.sendBeacon(
   ENDPOINT,
   new Blob([payload], {type:"text/plain;charset=utf-8"})
 );

 if(ok) showToast("저장 요청 전송 완료 ✔ (시트 확인)");
 else alert("전송 실패");
}

document.getElementById("date").value =
 new Date().toISOString().slice(0,10);

render();
</script>
</body>
</html>
