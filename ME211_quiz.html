<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ME211 Quiz</title>
  <style>
    :root { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
    body { margin: 0; background: #f6f7fb; color: #111; }
    header{
      background:#fff; border-bottom:1px solid #e5e7f2;
      padding:12px 16px; display:flex; align-items:center; justify-content:space-between;
      gap:12px;
    }
    .header-left{ display:flex; align-items:center; gap:16px; min-width:0; }
    .logo{ height:44px; }
    .titlewrap{ min-width:0; }
    .titlewrap h1{ margin:0; font-size:18px; font-weight:800; line-height:1.15; }
    .titlewrap .sub{ margin-top:6px; font-size:12px; color:#586174; }
    .qr{ width:74px; height:74px; border-radius:10px; border:1px solid #eef0f7; background:#fff; }

    main { max-width:980px; margin:0 auto; padding:16px; }
    .card { background:#fff; border-radius:14px; padding:14px; box-shadow:0 8px 22px rgba(0,0,0,.08); margin-bottom:12px; }
    .muted { color:#586174; font-size:13px; }
    .small { font-size:12px; }
    input[type="text"]{
      width:100%; padding:10px 12px; border:1px solid #d9dbe7; border-radius:10px;
      font-size:14px; box-sizing:border-box;
    }
    button { border:0; border-radius:10px; padding:10px 12px; font-weight:800; cursor:pointer; }
    button.primary{ background:#111; color:#fff; }
    button.secondary{ background:#e9ebf5; color:#111; }
    button:disabled{ opacity:.5; cursor:not-allowed; }
    .divider{ height:1px; background:#eef0f7; margin:12px 0; }

    .qtitle { font-weight:900; margin-bottom:10px; }
    .opt { display:block; padding:10px 10px; border:1px solid #dde0ee; border-radius:10px; margin-bottom:8px; cursor:pointer; }
    .opt input { margin-right:8px; }
    .qimg{ max-width:100%; border-radius:12px; margin:10px 0; border:1px solid #eef0f7; }

    .hidden { display:none !important; }
    .teacher { border:1px dashed #b7bdff; background:#fbfbff; }
    .linkbtn { text-decoration:none; display:inline-flex; align-items:center; gap:8px; }
    .pill { padding:6px 10px; border-radius:999px; background:#eef0ff; color:#2431a5; font-size:12px; font-weight:800; }

    .row{ display:flex; gap:10px; flex-wrap:wrap; align-items:flex-start; }
    .grow{ flex:1 1 360px; min-width:260px; }
    .actions{ flex:0 0 auto; display:flex; gap:10px; flex-wrap:wrap; min-width:220px; }
    .actions button{ white-space:nowrap; }
    @media (max-width: 720px){
      .actions{ width:100%; }
      .actions button{ width:100%; }
    }

    .seg { display:flex; gap:10px; flex-wrap:wrap; margin:10px 0 12px; }
    .seg button{
      border-radius:999px; padding:10px 14px;
      background:#e9ebf5; color:#1b4f9a;
      font-weight:900;
    }
    .seg button.active{ background:#111; color:#fff; }

    .chartWrap{
      border:1px solid #eef0f7;
      border-radius:16px;
      padding:12px;
      background:#fff;
      overflow:hidden;
    }
    canvas{ width:100%; height:360px; display:block; }
    .chartCaption{ margin-top:10px; color:#586174; font-size:12px; }

    table.stats { width:100%; border-collapse:collapse; font-size:13px; margin-top:10px; }
    table.stats th, table.stats td { border-bottom:1px solid #eef0f7; padding:8px 6px; text-align:right; }
    table.stats th:first-child, table.stats td:first-child { text-align:left; }
  </style>
</head>

<body>
  <header>
    <div class="header-left">
      <img class="logo" src="KAIST_ME_logo.jpg" alt="KAIST logo" />
      <div class="titlewrap">
        <h1 id="title">ME211 Quiz</h1>
        <div class="sub"><span class="pill" id="lecturePill"></span></div>
        <div class="sub" id="subtitle">Enter Student ID → Start → Answer all → Submit. Teacher Mode shows answers & stats.</div>
      </div>
    </div>
    <img id="qrImg" class="qr" alt="QR code" />
  </header>

  <main>
    <div class="card" id="studentCard">
      <div class="row">
        <div class="grow">
          <div class="muted">Student ID (required)</div>
          <input id="studentId" type="text" placeholder="e.g., 20261234" autocomplete="off" />
        </div>
        <div class="actions">
          <button class="secondary" id="btnTeacher" type="button">Teacher Mode</button>
          <button class="secondary" id="btnStart" type="button">Start</button>
          <button class="primary" id="btnSubmit" type="button" disabled>Submit</button>
        </div>
      </div>

      <div class="divider"></div>
      <div class="muted small" id="loadStatus">Loading questions…</div>
      <div class="muted small" id="saveStatus">Not submitted yet.</div>
    </div>

    <div class="card teacher hidden" id="teacherCard">
      <div class="qtitle">Teacher Mode</div>
      <div class="muted" id="teacherStatus" style="margin-bottom:10px;">
        Enter password to show answers/explanations immediately.
      </div>

      <div class="divider"></div>
      <div class="qtitle">Statistics & Charts</div>
      <div class="muted small" id="statsStatus">Loading…</div>

      <div class="seg">
        <button type="button" id="tabWrong" class="active">1) Wrong rate (Top wrong)</button>
        <button type="button" id="tabPicks">2) Option picks (per question)</button>
        <button type="button" id="tabScore">3) Score distribution</button>
      </div>

      <div class="chartWrap">
        <canvas id="chart" width="1200" height="720"></canvas>
        <div class="chartCaption" id="chartCaption"></div>
      </div>

      <div class="divider"></div>

      <div class="row">
        <a id="btnOpenResults" class="linkbtn" target="_blank" rel="noopener">
          <button class="secondary" type="button">Open Results Sheet</button>
        </a>
        <a id="btnOpenGradebook" class="linkbtn" target="_blank" rel="noopener">
          <button class="secondary" type="button">Open Gradebook</button>
        </a>
        <a id="btnOpenStats" class="linkbtn" target="_blank" rel="noopener">
          <button class="secondary" type="button">Open Stats (this lecture)</button>
        </a>
        <div class="muted small" id="teacherLinksStatus"></div>
      </div>
    </div>

    <div id="quizArea"></div>

    <div class="card hidden" id="summaryCard">
      <div class="row">
        <div class="grow">
          <div class="qtitle">Result</div>
          <div class="muted" id="summaryLine"></div>
        </div>
        <div class="qtitle" id="scoreLine"></div>
      </div>
    </div>
  </main>

  <script>
    // =========================
    // CONFIG
    // =========================
    const DEFAULT_LECTURE = "Lecture 3";
    const TEACHER_PASSWORD = "1730";
    const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzZljM3azXE-1C_DeUG4uICGeuk8WlbDpFxhnMnPNTtI2VIwOcYJOvGYtnhCKQgQlZ2Nw/exec";
    const JSONP_CALLBACK = "initQuizFromServer";

    // KAIST Blue
    const KAIST_BLUE = "#003B8E";

    // Distinct option colors
    const OPT_COLORS = [
      "#003B8E", // Pick0
      "#00A0DF", // Pick1
      "#6A00FF", // Pick2
      "#00B894"  // Pick3
    ];

    let TEACHER_MODE = false;
    let quiz = [];
    let statsRows = [];
    let scorePairs = []; // [{score,total}, ...]

    let activeChart = "wrong"; // wrong | picks | score

    const $ = (id) => document.getElementById(id);

    function getLectureFromUrl() {
      const p = new URLSearchParams(location.search);
      const raw = (p.get("lecture") || "").trim();
      return raw || DEFAULT_LECTURE;
    }
    const LECTURE = getLectureFromUrl();

    $("lecturePill").textContent = LECTURE;
    document.title = `ME211 Quiz - ${LECTURE}`;

    (function initQR(){
      const url = location.href;
      $("qrImg").src = "https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=" + encodeURIComponent(url);
    })();

    function escapeHtml(s){
      return (s ?? "").toString()
        .replaceAll("&","&amp;").replaceAll("<","&lt;")
        .replaceAll(">","&gt;").replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    // =========================
    // Questions (JSONP)
    // =========================
    function loadQuestions() {
      const s = document.createElement("script");
      s.src = `${WEBAPP_URL}?lecture=${encodeURIComponent(LECTURE)}&callback=${encodeURIComponent(JSONP_CALLBACK)}`;
      s.onerror = () => {
        $("loadStatus").textContent = "Failed to load questions (check WebApp deployment/public access).";
      };
      document.head.appendChild(s);
    }

    function initQuizFromServer(payload) {
      if (!payload || !payload.ok) {
        $("loadStatus").textContent = "ERROR loading questions: " + (payload?.message || "unknown");
        return;
      }
      quiz = payload.quiz || [];
      $("loadStatus").textContent = `Loaded ${quiz.length} questions from Questions/${LECTURE}.`;
      renderQuiz();
    }
    window[JSONP_CALLBACK] = initQuizFromServer;

    function renderQuiz(){
      const area = $("quizArea");
      area.innerHTML = "";

      if (!quiz.length) {
        area.innerHTML = `<div class="card"><div class="muted">No questions loaded.</div></div>`;
        return;
      }

      quiz.forEach((item, idx) => {
        const card = document.createElement("div");
        card.className = "card";
        card.dataset.qidx = idx;

        const title = document.createElement("div");
        title.className = "qtitle";
        title.innerHTML = `${idx+1}. ${escapeHtml(item.q)}`;
        card.appendChild(title);

        if (item.img) {
          const im = document.createElement("img");
          im.className = "qimg";
          im.src = item.img;
          im.alt = `Question ${idx+1} image`;
          card.appendChild(im);
        }

        item.options.forEach((opt, j) => {
          const lab = document.createElement("label");
          lab.className = "opt";
          lab.innerHTML = `<input type="radio" name="q${idx}" value="${j}"> ${escapeHtml(opt)}`;
          card.appendChild(lab);
        });

        const exp = document.createElement("div");
        exp.className = "muted small hidden teacher-only";
        exp.innerHTML = `<div class="divider"></div><div><b>Explanation:</b> ${escapeHtml(item.exp || "")}</div>`;
        card.appendChild(exp);

        const ans = document.createElement("div");
        ans.className = "muted small hidden teacher-only";
        ans.innerHTML = `<div><b>Correct answer:</b> ${escapeHtml(item.options[item.answer])}</div>`;
        card.appendChild(ans);

        area.appendChild(card);
      });
    }

    function allAnswered(){
      for (let i=0;i<quiz.length;i++){
        if (!document.querySelector(`input[name="q${i}"]:checked`)) return false;
      }
      return true;
    }

    function lockInputs(){
      document.querySelectorAll('input[type="radio"]').forEach(r => r.disabled = true);
      $("btnSubmit").disabled = true;
      $("btnStart").disabled = true;
      $("studentId").disabled = true;
      $("btnTeacher").disabled = true;
    }

    function gradeAndMark(){
      let correct = 0;
      for (let i=0;i<quiz.length;i++){
        const checked = document.querySelector(`input[name="q${i}"]:checked`);
        const picked = checked ? parseInt(checked.value, 10) : -1;

        const card = document.querySelector(`.card[data-qidx="${i}"]`);
        const labels = card.querySelectorAll("label.opt");
        labels.forEach((lab, j) => {
          lab.style.borderColor = "#dde0ee";
          lab.style.background = "#fff";
          if (picked === j && picked === quiz[i].answer) {
            lab.style.borderColor = "#0b7a3a";
            lab.style.background = "rgba(11,122,58,.08)";
          } else if (picked === j && picked !== quiz[i].answer) {
            lab.style.borderColor = "#b5001a";
            lab.style.background = "rgba(181,0,26,.06)";
          }
        });

        if (picked === quiz[i].answer) correct++;
      }
      return correct;
    }

    async function saveToSheet(payload){
      await fetch(WEBAPP_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
    }

    // =========================
    // Teacher data
    // =========================
    async function loadTeacherLinks(){
      try{
        $("teacherLinksStatus").textContent = "Loading links…";
        const url = `${WEBAPP_URL}?action=links&lecture=${encodeURIComponent(LECTURE)}`;
        const res = await fetch(url, { method:"GET" });
        const data = await res.json();
        if (!data.ok) throw new Error(data.message || "links not ok");

        $("btnOpenResults").href = data.resultsUrl;
        $("btnOpenGradebook").href = data.resultsUrl;
        $("btnOpenStats").href = data.resultsUrl;

        $("teacherLinksStatus").textContent =
          `Tabs: Gradebook, ${data.statsTab || ("Stats - "+LECTURE)}, and ${LECTURE}.`;
      } catch(e){
        $("teacherLinksStatus").textContent = "Link load failed: " + (e?.message || "unknown");
      }
    }

    async function loadStats(){
      const url = `${WEBAPP_URL}?action=stats&lecture=${encodeURIComponent(LECTURE)}`;
      const res = await fetch(url, { method:"GET" });
      const data = await res.json();
      if (!data.ok) throw new Error(data.message || "stats not ok");
      statsRows = data.rows || [];
      return data;
    }

    async function loadScores(){
      const url = `${WEBAPP_URL}?action=scores&lecture=${encodeURIComponent(LECTURE)}`;
      const res = await fetch(url, { method:"GET" });
      const data = await res.json();
      if (!data.ok) throw new Error(data.message || "scores not ok");

      const s = data.scores || [];
      if (!s.length) {
        scorePairs = [];
        return data;
      }

      if (typeof s[0] === "number") {
        const total = Number(data.totalQuestions);
        const inferredTotal = Number.isFinite(total) ? total : Math.max(...s);
        scorePairs = s.map(x => ({ score:Number(x), total: inferredTotal }));
      } else {
        scorePairs = s.map(o => ({ score:Number(o.score), total:Number(o.total) }));
      }
      return data;
    }

    async function loadTeacherData(){
      $("statsStatus").textContent = "Loading stats/scores…";
      try{
        await loadTeacherLinks();
        await Promise.all([loadStats(), loadScores()]);
        $("statsStatus").textContent = `Loaded stats/scores for ${LECTURE}.`;
        renderChart();
      } catch(e){
        $("statsStatus").textContent = "Load failed: " + (e?.message || "unknown");
      }
    }

    function revealTeacherUI(){
      $("teacherCard").classList.remove("hidden");
      document.querySelectorAll(".teacher-only").forEach(el => el.classList.remove("hidden"));
      loadTeacherData();
    }

    // =========================
    // Chart drawing utils
    // =========================
    function getCanvasCtx(){
      const c = $("chart");
      const ctx = c.getContext("2d");
      const dpr = window.devicePixelRatio || 1;

      const cssW = c.clientWidth || 800;
      const cssH = c.clientHeight || 360;
      c.width  = Math.floor(cssW * dpr);
      c.height = Math.floor(cssH * dpr);

      return { c, ctx, dpr, W:c.width, H:c.height };
    }

    function clearCanvas(ctx, W, H){
      ctx.clearRect(0,0,W,H);
      ctx.fillStyle = "#fff";
      ctx.fillRect(0,0,W,H);
    }

    function drawText(ctx, str, x, y, size, color, align="left"){
      ctx.fillStyle = color;
      ctx.font = `${size}px system-ui, -apple-system, Segoe UI, Roboto, Arial`;
      ctx.textAlign = align;
      ctx.textBaseline = "alphabetic";
      ctx.fillText(str, x, y);
    }

    function pct(x){
      if (!isFinite(x)) return "-";
      return (x*100).toFixed(1) + "%";
    }

    // =========================
    // Chart 1: Wrong rate
    // =========================
    function drawWrongRate(rows){
      const {ctx,dpr,W,H} = getCanvasCtx();
      clearCanvas(ctx,W,H);

      const padL = 72*dpr, padR = 110*dpr, padT = 24*dpr, padB = 32*dpr;
      const innerW = W - padL - padR;
      const innerH = H - padT - padB;

      const data = [...rows]
        .map(r => ({ q: r.q, wrongRate: Number(r.wrongRate||0), attempts: Number(r.attempts||0) }))
        .sort((a,b)=> (b.wrongRate - a.wrongRate))
        .slice(0, 10);

      if (!data.length){
        drawText(ctx, "No stats rows yet.", padL, padT + 24*dpr, 14*dpr, "#586174");
        return;
      }

      ctx.strokeStyle = "#cfd4e6";
      ctx.lineWidth = 1*dpr;
      ctx.beginPath();
      ctx.moveTo(padL, padT);
      ctx.lineTo(padL, padT + innerH);
      ctx.lineTo(padL + innerW, padT + innerH);
      ctx.stroke();

      const barGap = 10*dpr;
      const barH = Math.max(14*dpr, (innerH - barGap*(data.length-1)) / data.length);

      data.forEach((r, i)=>{
        const y = padT + i*(barH + barGap);
        const bw = innerW * Math.max(0, Math.min(1, r.wrongRate));

        ctx.fillStyle = KAIST_BLUE;
        ctx.fillRect(padL, y, bw, barH);

        drawText(ctx, "Q"+r.q, padL - 12*dpr, y + barH*0.78, 12*dpr, "#111", "right");

        // ✅ 100% label auto white inside bar if needed
        const label = pct(r.wrongRate);
        ctx.font = `${12*dpr}px system-ui, -apple-system, Segoe UI, Roboto, Arial`;
        const tw = ctx.measureText(label).width;

        let tx = padL + bw + 8*dpr;
        let color = "#111";

        if (tx + tw > W - padR) {
          tx = padL + bw - tw - 8*dpr;
          color = "#fff";
        }

        tx = Math.max(padL + 6*dpr, tx);
        ctx.fillStyle = color;
        ctx.textAlign = "left";
        ctx.fillText(label, tx, y + barH*0.78);
      });
    }

    // =========================
    // Chart 2: Option picks
    // =========================
    function drawOptionPicks(rows){
      const {ctx,dpr,W,H} = getCanvasCtx();
      clearCanvas(ctx,W,H);

      const padL=48*dpr, padR=18*dpr, padT=24*dpr, padB=84*dpr;
      const innerW=W-padL-padR, innerH=H-padT-padB;

      const data = [...rows].sort((a,b)=> (a.q||0)-(b.q||0));
      if (!data.length){
        drawText(ctx, "No stats rows yet.", padL, padT + 24*dpr, 14*dpr, "#586174");
        return;
      }

      const maxPick = Math.max(1, ...data.map(r => Math.max(r.pick0||0,r.pick1||0,r.pick2||0,r.pick3||0)));

      ctx.strokeStyle="#cfd4e6";
      ctx.lineWidth=1*dpr;
      ctx.beginPath();
      ctx.moveTo(padL,padT);
      ctx.lineTo(padL,padT+innerH);
      ctx.lineTo(padL+innerW,padT+innerH);
      ctx.stroke();

      const groupW = innerW / data.length;
      const barW = Math.max(6*dpr, Math.min(18*dpr, groupW*0.16));
      const offsets = [-1.5, -0.5, 0.5, 1.5].map(k => k*barW);

      data.forEach((r, i)=>{
        const xCenter = padL + i*groupW + groupW*0.5;
        const picks = [r.pick0||0, r.pick1||0, r.pick2||0, r.pick3||0];

        picks.forEach((v, j)=>{
          const h = innerH * (v / maxPick);
          const x = xCenter + offsets[j] - barW*0.5;
          const y = padT + innerH - h;
          ctx.fillStyle = OPT_COLORS[j];
          ctx.fillRect(x, y, barW, h);
        });

        drawText(ctx, "Q"+r.q, xCenter, padT+innerH+28*dpr, 12*dpr, "#111", "center");
      });

      // legend
      const baseY = padT + innerH + 58*dpr;
      const legendX = padL;
      const labels = ["Pick0","Pick1","Pick2","Pick3"];
      labels.forEach((lab, i)=>{
        ctx.fillStyle = OPT_COLORS[i];
        ctx.fillRect(legendX + i*120*dpr, baseY-10*dpr, 14*dpr, 10*dpr);
        drawText(ctx, lab, legendX + i*120*dpr + 20*dpr, baseY, 12*dpr, "#586174", "left");
      });
    }

    // =========================
    // Chart 3: Score histogram
    // =========================
    function drawScoreHistogram(pairs){
      const {ctx,dpr,W,H} = getCanvasCtx();
      clearCanvas(ctx,W,H);

      const padL=54*dpr, padR=18*dpr, padT=24*dpr, padB=64*dpr;
      const innerW=W-padL-padR, innerH=H-padT-padB;

      if (!pairs.length){
        drawText(ctx, "No score data yet.", padL, padT + 24*dpr, 14*dpr, "#586174");
        return;
      }

      const total = Math.max(...pairs.map(p => p.total||0));
      const hist = Array.from({length: total+1}, ()=>0);
      pairs.forEach(p=>{
        const s = Math.max(0, Math.min(total, Math.round(p.score||0)));
        hist[s] += 1;
      });
      const maxCount = Math.max(1, ...hist);

      ctx.strokeStyle="#cfd4e6";
      ctx.lineWidth=1*dpr;
      ctx.beginPath();
      ctx.moveTo(padL,padT);
      ctx.lineTo(padL,padT+innerH);
      ctx.lineTo(padL+innerW,padT+innerH);
      ctx.stroke();

      const n = hist.length;
      const gap = 4*dpr;
      const barW = Math.max(6*dpr, (innerW - gap*(n-1)) / n);

      hist.forEach((cnt, i)=>{
        const h = innerH * (cnt / maxCount);
        const x = padL + i*(barW+gap);
        const y = padT + innerH - h;
        ctx.fillStyle = KAIST_BLUE;
        ctx.fillRect(x, y, barW, h);

        const step = (total <= 12) ? 1 : Math.ceil(total/12);
        if (i % step === 0 || i === total){
          drawText(ctx, String(i), x + barW*0.5, padT+innerH+28*dpr, 12*dpr, "#111", "center");
        }
      });

      drawText(ctx, "Score (0.." + total + ")", padL, padT + innerH + 56*dpr, 12*dpr, "#586174", "left");
    }

    // =========================
    // Chart switching
    // =========================
    function setActiveTab(which){
      activeChart = which;
      $("tabWrong").classList.toggle("active", which==="wrong");
      $("tabPicks").classList.toggle("active", which==="picks");
      $("tabScore").classList.toggle("active", which==="score");
      renderChart();
    }

    function renderChart(){
      if (!TEACHER_MODE) return;

      if (activeChart==="wrong"){
        $("chartCaption").textContent = "Wrong rate top list (based on Stats sheet).";
        drawWrongRate(statsRows);
      } else if (activeChart==="picks"){
        $("chartCaption").textContent = "Option pick counts per question (bars = Pick0..Pick3).";
        drawOptionPicks(statsRows);
      } else {
        const total = scorePairs.length ? (scorePairs[0].total || 0) : 0;
        $("chartCaption").textContent = "Score distribution histogram (0.." + total + ").";
        drawScoreHistogram(scorePairs);
      }
    }

    $("tabWrong").addEventListener("click", ()=>setActiveTab("wrong"));
    $("tabPicks").addEventListener("click", ()=>setActiveTab("picks"));
    $("tabScore").addEventListener("click", ()=>setActiveTab("score"));
    window.addEventListener("resize", ()=>{ if(TEACHER_MODE) renderChart(); });

    // =========================
    // Teacher mode
    // =========================
    $("btnTeacher").addEventListener("click", () => {
      const pw = prompt("Teacher password:");
      if (pw === TEACHER_PASSWORD) {
        TEACHER_MODE = true;
        $("teacherStatus").textContent = "✅ Password accepted → Correct answers & explanations are visible immediately.";
        revealTeacherUI();
        alert("Teacher Mode enabled.");
      } else {
        alert("Wrong password.");
      }
    });

    // =========================
    // Student flow
    // =========================
    $("btnStart").addEventListener("click", () => {
      const sid = $("studentId").value.trim();
      if (!sid) { alert("Please enter Student ID."); return; }
      if (!quiz.length) { alert("Questions not loaded yet."); return; }
      $("btnSubmit").disabled = false;
      window.scrollTo({ top: $("quizArea").offsetTop - 8, behavior: "smooth" });
    });

    $("btnSubmit").addEventListener("click", async () => {
      const sid = $("studentId").value.trim();
      if (!sid) { alert("Please enter Student ID."); return; }
      if (!quiz.length) { alert("Questions not loaded yet."); return; }
      if (!allAnswered()) { alert("Please answer all questions before submitting."); return; }

      const correct = gradeAndMark();
      const total = quiz.length;

      const answers = quiz.map((q, i) => {
        const picked = parseInt(document.querySelector(`input[name="q${i}"]:checked`).value, 10);
        return { i: i+1, picked, correct: q.answer, ok: picked === q.answer };
      });

      const payload = {
        kind: "me211_quiz_v1",
        lecture: LECTURE,
        student_id: sid,
        score: correct,
        total,
        submitted_at: new Date().toISOString(),
        answers
      };

      $("saveStatus").textContent = `Saving to Results/${LECTURE} + Gradebook + Stats…`;

      try {
        await saveToSheet(payload);
        $("saveStatus").textContent = `Saved ✅ (Results/${LECTURE} updated)`;
      } catch (e) {
        $("saveStatus").textContent = "Save failed: " + (e?.message || "unknown");
      }

      lockInputs();

      $("summaryCard").classList.remove("hidden");
      $("summaryLine").textContent = `Student ID: ${sid} · Total questions: ${total}`;
      $("scoreLine").textContent = `${correct} / ${total}`;

      if (TEACHER_MODE){
        await loadTeacherData();
      }

      window.scrollTo({ top: $("summaryCard").offsetTop - 8, behavior: "smooth" });
    });

    // =========================
    // Teacher UI
    // =========================
    async function loadTeacherData(){
      $("statsStatus").textContent = "Loading stats/scores…";
      try{
        await loadTeacherLinks();
        await Promise.all([loadStats(), loadScores()]);
        $("statsStatus").textContent = `Loaded stats/scores for ${LECTURE}.`;
        renderChart();
      } catch(e){
        $("statsStatus").textContent = "Load failed: " + (e?.message || "unknown");
      }
    }

    function revealTeacherUI(){
      $("teacherCard").classList.remove("hidden");
      document.querySelectorAll(".teacher-only").forEach(el => el.classList.remove("hidden"));
      loadTeacherData();
    }

    // init
    loadQuestions();
    setActiveTab("wrong");
  </script>
</body>
</html>
